version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: opm_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    networks:
      - opm_network
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=order_payment_db
      - DB_USERNAME=opm_user
      - DB_PASSWORD=opm_secret

  nginx:
    image: nginx:1.25-alpine
    container_name: opm_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - opm_network
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: opm_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: order_payment_db
      MYSQL_USER: opm_user
      MYSQL_PASSWORD: opm_secret
      MYSQL_ROOT_PASSWORD: root_secret
    ports:
      - "3307:3306"
    volumes:
      - opm_mysql_data:/var/lib/mysql
    networks:
      - opm_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_secret"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  opm_network:
    driver: bridge

volumes:
  opm_mysql_data:
    driver: local
